services:
  db:
    image: postgres:16-alpine
    container_name: readlingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: readlingo
      POSTGRES_USER: readlingo
      POSTGRES_PASSWORD: readlingo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
